name: Build Geode Mod

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Clone Geode SDK
        run: |
          git clone --recursive https://github.com/geode-sdk/geode.git geode-sdk

      - name: Set Geode SDK environment variable
        run: |
          echo "GEODE_SDK=$PWD/geode-sdk" >> $env:GITHUB_ENV

      - name: Configure
        run: |
          cmake -B build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build --config Release

      - name: Upload Windows Mod
        uses: actions/upload-artifact@v4
        with:
          name: windows-mod
          path: windows/build/**/*.geode

  build-android64:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Clone Geode SDK
        run: |
          git clone --recursive https://github.com/geode-sdk/geode.git geode-sdk

      - name: Set Geode SDK environment variable
        run: |
          echo "GEODE_SDK=$PWD/geode-sdk" >> $GITHUB_ENV

      - name: Configure
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_ABI=arm64-v8a

      - name: Build
        run: |
          cmake --build build --config Release

      - name: Upload Android64 Mod
        uses: actions/upload-artifact@v4
        with:
          name: android64-mod
          path: android64/build/**/*.geode
